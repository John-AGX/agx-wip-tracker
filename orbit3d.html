<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Site View — Project 86</title>
<style>
  html,body{margin:0;height:100%;background:#0b0e16;overflow:hidden;font-family:Inter,system-ui,-apple-system,'Segoe UI',sans-serif}
  #host,gmp-map-3d{display:block;width:100%;height:100%}
  #err{position:absolute;inset:0;display:none;flex-direction:column;gap:8px;align-items:center;justify-content:center;color:#aeb4c4;font-size:13px;text-align:center;padding:28px;line-height:1.55}
  #err.on{display:flex}
  #err b{color:#e6e9f2;font-size:14px}
  /* Docked building card — same brand surface as the app inspector. */
  #card{position:absolute;left:14px;bottom:44px;width:280px;max-height:62vh;overflow-y:auto;display:none;
    background:rgba(15,23,42,.94);border:1px solid rgba(34,211,238,.35);border-radius:12px;
    box-shadow:0 12px 32px rgba(0,0,0,.55);color:#e6e9f2;padding:14px 16px 12px;z-index:20}
  #card.on{display:block}
  #card h3{margin:0 34px 2px 0;font-size:14.5px;font-weight:700;color:#fff;line-height:1.3}
  #card .sub{font-size:11px;color:#8b93a7;margin-bottom:10px}
  #card .x{position:absolute;top:8px;right:8px;width:26px;height:26px;border:none;border-radius:7px;
    background:transparent;color:#aeb4c4;font-size:15px;cursor:pointer}
  #card .x:hover{background:rgba(255,255,255,.08)}
  .bigpct{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
  .bigpct b{font-size:26px;color:#22D3EE;font-weight:700}
  .bigpct span{font-size:11px;color:#8b93a7;letter-spacing:.4px;text-transform:uppercase}
  .bar{height:6px;border-radius:4px;background:rgba(255,255,255,.10);overflow:hidden;margin-bottom:12px}
  .bar i{display:block;height:100%;border-radius:4px;background:#22D3EE}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-bottom:12px}
  .kpi{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:6px 9px}
  .kpi label{display:block;font-size:9.5px;color:#8b93a7;letter-spacing:.5px;text-transform:uppercase}
  .kpi div{font-size:13px;font-weight:600;color:#fff;margin-top:1px}
  .hstep{width:26px;height:26px;border:1px solid rgba(34,211,238,.4);border-radius:7px;background:transparent;
    color:#9be9f5;font-size:15px;line-height:1;cursor:pointer}
  .hstep:hover{background:rgba(34,211,238,.14)}
  .ph-head{font-size:10px;color:#8b93a7;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
  .ph{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .ph .nm{flex:1;min-width:0;font-size:12px;color:#dbe1ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ph .pbar{flex:0 0 72px;height:5px;border-radius:3px;background:rgba(255,255,255,.10);overflow:hidden}
  .ph .pbar i{display:block;height:100%;background:#4f8cff}
  .ph .pv{flex:0 0 34px;text-align:right;font-size:11px;color:#9bbcff;font-variant-numeric:tabular-nums}
  .ph.co .pbar i{background:#fbbf24}
  .ph.co .pv{color:#fbd77a}
  /* Orbit control */
  #orbitBtn{position:absolute;right:14px;bottom:44px;z-index:20;display:none;align-items:center;gap:6px;
    padding:7px 13px;border:1px solid rgba(34,211,238,.4);border-radius:9px;background:rgba(15,23,42,.9);
    color:#9be9f5;font-size:12px;font-weight:600;cursor:pointer}
  #orbitBtn.on{display:flex}
  #orbitBtn:hover{background:rgba(34,211,238,.14)}
  /* Design settings — right-hand drawer */
  #designBtn{position:absolute;top:52px;right:14px;z-index:20;display:flex;align-items:center;gap:6px;
    padding:7px 13px;border:1px solid rgba(34,211,238,.4);border-radius:9px;background:rgba(15,23,42,.9);
    color:#9be9f5;font-size:12px;font-weight:600;cursor:pointer}
  #designBtn:hover{background:rgba(34,211,238,.14)}
  #design{position:absolute;top:0;right:0;height:100%;width:248px;z-index:25;box-sizing:border-box;
    background:rgba(15,23,42,.96);border-left:1px solid rgba(34,211,238,.35);padding:16px 16px 24px;
    overflow-y:auto;color:#e6e9f2;transform:translateX(100%);transition:transform .18s ease}
  #design.on{transform:translateX(0)}
  #design h2{margin:0 0 14px;font-size:13px;font-weight:700;color:#fff;letter-spacing:.4px}
  #design .dx{position:absolute;top:10px;right:10px;width:26px;height:26px;border:none;border-radius:7px;
    background:transparent;color:#aeb4c4;font-size:14px;cursor:pointer}
  #design .dx:hover{background:rgba(255,255,255,.08)}
  .dsec{margin-bottom:16px}
  .dsec label{display:block;font-size:9.5px;color:#8b93a7;letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px}
  .swatches{display:flex;gap:8px;flex-wrap:wrap}
  .sw{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;box-sizing:border-box}
  .sw.on{border-color:#fff;box-shadow:0 0 0 2px rgba(34,211,238,.6)}
  .sw.auto{background:conic-gradient(#64748b,#4f8cff,#34d399,#64748b);display:flex;align-items:center;justify-content:center;
    font-size:8px;color:#fff;font-weight:700}
  .dchips{display:flex;gap:6px;flex-wrap:wrap}
  .dchip{padding:5px 11px;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:transparent;
    color:#c6ccdb;font-size:11.5px;cursor:pointer}
  .dchip.on{border-color:#22D3EE;color:#9be9f5;background:rgba(34,211,238,.12);font-weight:600}
  .dtoggle{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#dbe1ee;margin-bottom:9px;cursor:pointer}
  .dtoggle input{accent-color:#22D3EE;width:15px;height:15px;cursor:pointer}
  input[type=range]{width:100%;accent-color:#22D3EE}
</style>
</head>
<body>
<div id="host"></div>
<div id="card"><button class="x" id="cardX" type="button">✕</button><div id="cardBody"></div></div>
<button id="orbitBtn" type="button">⟳ Orbit</button>
<button id="designBtn" type="button">🎨 Design</button>
<div id="design">
  <button class="dx" id="designX" type="button">✕</button>
  <h2>3D Design</h2>
  <div class="dsec"><label>Building shading</label>
    <div class="swatches" id="dShade">
      <div class="sw" data-shade="#4f8cff" style="background:#4f8cff"></div>
      <div class="sw" data-shade="#22D3EE" style="background:#22D3EE"></div>
      <div class="sw" data-shade="#34d399" style="background:#34d399"></div>
      <div class="sw" data-shade="#fbbf24" style="background:#fbbf24"></div>
      <div class="sw" data-shade="#f87171" style="background:#f87171"></div>
      <div class="sw" data-shade="#a78bfa" style="background:#a78bfa"></div>
    </div>
  </div>
  <div class="dsec"><label>Shading opacity</label>
    <input type="range" id="dOpacity" min="0.10" max="0.80" step="0.05">
  </div>
  <div class="dsec"><label>Edge / line color</label>
    <div class="swatches" id="dEdge">
      <div class="sw" data-edge="#22D3EE" style="background:#22D3EE"></div>
      <div class="sw" data-edge="#ffffff" style="background:#fff"></div>
      <div class="sw" data-edge="#7eb0ff" style="background:#7eb0ff"></div>
      <div class="sw" data-edge="#fbbf24" style="background:#fbbf24"></div>
      <div class="sw auto" data-edge="auto">A</div>
    </div>
  </div>
  <div class="dsec"><label>Pin style</label>
    <div class="dchips" id="dPin">
      <button type="button" class="dchip" data-pin="donut">Donut %</button>
      <button type="button" class="dchip" data-pin="detailed">Detailed</button>
      <button type="button" class="dchip" data-pin="dot">Dot</button>
    </div>
  </div>
  <div class="dsec"><label>Options</label>
    <label class="dtoggle"><span>Building name labels</span><input type="checkbox" id="dLabels"></label>
    <label class="dtoggle"><span>Show building blocks</span><input type="checkbox" id="dBlocks"></label>
    <label class="dtoggle"><span>Shade by progress</span><input type="checkbox" id="dByProgress"></label>
  </div>
</div>
<div id="err"></div>
<script>
/* Isolated Photorealistic 3D page. Loads Google Maps on the BETA channel (3D Maps /
   Map3DElement are Preview-only) so the parent app can stay on the production "weekly"
   channel. Renders the Google-Earth 3D tiles, the job's building footprints as extruded
   highlighted blocks, an INTERACTIVE data pin above each building (% complete, colored
   by status), and a docked building card (phases + financials) on pin click. The intro
   orbit stops the moment the user grabs the map; the ⟳ Orbit button restarts it. The
   parent (nodegraph/ui.js postOrbitData) feeds everything via postMessage; this page
   never holds app data of its own. */
(function(){
  'use strict';
  var errEl=document.getElementById('err'), host=document.getElementById('host');
  var cardEl=document.getElementById('card'), cardBody=document.getElementById('cardBody');
  var orbitBtn=document.getElementById('orbitBtn');
  function fail(title, detail){ errEl.innerHTML='<b>'+title+'</b>'+(detail?('<div>'+detail+'</div>'):''); errEl.classList.add('on'); }
  var Lib=null, MarkerLib=null, map3d=null, pending=null, drawn=[], center=null, orbiting=false;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function money(n){ n=Number(n)||0; return '$'+Math.round(n).toLocaleString('en-US'); }
  function pctColor(p){ return p>=100 ? '#34d399' : (p>0 ? '#4f8cff' : '#64748b'); }
  function centroid(path){
    var la=0,ln=0; path.forEach(function(p){ la+=p.lat; ln+=p.lng; });
    return { lat:la/path.length, lng:ln/path.length };
  }
  // Push every footprint vertex OUTWARD from the centroid by a fixed number
  // of meters. The trace follows the ROOFLINE, so the raw extrusion slices
  // through walls/eaves — a ~2m buffer makes the block engulf the whole
  // building instead of clipping it.
  var M_PER_DEG_LAT=111320;
  function expandPath(path, meters){
    var c=centroid(path);
    var mLng=M_PER_DEG_LAT*Math.cos(c.lat*Math.PI/180)||M_PER_DEG_LAT;
    return path.map(function(p){
      var dx=(p.lng-c.lng)*mLng, dy=(p.lat-c.lat)*M_PER_DEG_LAT;   // vertex offset in meters
      var len=Math.sqrt(dx*dx+dy*dy)||1;
      var f=(len+meters)/len;                                       // scale outward by +meters
      return { lat:c.lat+(dy*f)/M_PER_DEG_LAT, lng:c.lng+(dx*f)/mLng };
    });
  }
  // Donut progress glyph for the pin: a ring arc showing pct + the number.
  function donutGlyph(pct){
    var NS='http://www.w3.org/2000/svg';
    var svg=document.createElementNS(NS,'svg');
    svg.setAttribute('viewBox','0 0 36 36'); svg.setAttribute('width','30'); svg.setAttribute('height','30');
    var r=15, cxy=18, circ=2*Math.PI*r;
    var track=document.createElementNS(NS,'circle');
    track.setAttribute('cx',cxy); track.setAttribute('cy',cxy); track.setAttribute('r',r);
    track.setAttribute('fill','none'); track.setAttribute('stroke','rgba(255,255,255,0.22)'); track.setAttribute('stroke-width','3.5');
    svg.appendChild(track);
    var arc=document.createElementNS(NS,'circle');
    arc.setAttribute('cx',cxy); arc.setAttribute('cy',cxy); arc.setAttribute('r',r);
    arc.setAttribute('fill','none'); arc.setAttribute('stroke',pctColor(pct)); arc.setAttribute('stroke-width','3.5');
    arc.setAttribute('stroke-linecap','round');
    arc.setAttribute('stroke-dasharray',(circ*Math.max(0.01,pct/100))+' '+circ);
    arc.setAttribute('transform','rotate(-90 '+cxy+' '+cxy+')');
    svg.appendChild(arc);
    var txt=document.createElementNS(NS,'text');
    txt.setAttribute('x',cxy); txt.setAttribute('y',cxy+0.5);
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','middle');
    txt.setAttribute('fill','#fff'); txt.setAttribute('font-size','11'); txt.setAttribute('font-weight','700');
    txt.setAttribute('font-family','Inter,system-ui,sans-serif');
    txt.textContent=pct;
    svg.appendChild(txt);
    return svg;
  }

  // Standard Google inline bootstrap, pinned to the beta release channel.
  function boot(key){
    (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src="https://maps."+c+"apis.com/maps/api/js?"+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({key:key, v:"beta"});
    Promise.all([
      google.maps.importLibrary("maps3d"),
      google.maps.importLibrary("marker").catch(function(){ return null; })
    ]).then(function(libs){
      Lib=libs[0]; MarkerLib=libs[1];
      try{ parent.postMessage({ type:'p86-orbit3d-ready' }, '*'); }catch(_){}
      if(pending){ render(pending); }
    }).catch(function(e){ fail('3D view unavailable', 'The Maps 3D library failed to load. '+((e&&e.message)||'')); });
  }

  // Card survives scene re-renders (e.g. a height change re-feeds the data)
  // by remembering which building it shows and re-binding after render.
  var selId=null;
  function clearDrawn(){ drawn.forEach(function(el){ try{ el.remove(); }catch(_){} }); drawn=[]; }
  function hideCard(){ cardEl.classList.remove('on'); selId=null; }
  document.getElementById('cardX').addEventListener('click', hideCard);

  function showCard(b){
    selId=b.nodeId||b.label;
    var pct=Math.max(0, Math.min(100, Number(b.pct)||0));
    var ft=Math.round((Number(b.heightM)||8)*3.2808);
    var html='';
    html+='<h3>'+esc(b.label)+'</h3>';
    html+='<div class="sub">'+(b.levels?b.levels+' level'+(b.levels===1?'':'s'):'')+(b.levels&&b.units?' · ':'')+(b.units?b.units+' units':'')+((b.levels||b.units)?'':'Traced building')+'</div>';
    html+='<div class="bigpct"><b>'+pct+'%</b><span>complete</span></div>';
    html+='<div class="bar"><i style="width:'+pct+'%;background:'+pctColor(pct)+'"></i></div>';
    html+='<div class="kpis">'+
      '<div class="kpi"><label>Total</label><div>'+money(b.total)+'</div></div>'+
      '<div class="kpi"><label>Spent</label><div>'+money(b.actual)+'</div></div>'+
      '<div class="kpi" style="grid-column:1 / -1"><label>3D height</label>'+
        '<div style="display:flex;align-items:center;gap:10px;">'+
          '<button type="button" class="hstep" data-hstep="-4">−</button>'+
          '<span style="min-width:52px;text-align:center;">'+ft+' ft</span>'+
          '<button type="button" class="hstep" data-hstep="4">+</button>'+
        '</div>'+
      '</div>'+
    '</div>';
    var phs=(b.phases||[]);
    if(phs.length){
      html+='<div class="ph-head">Phases &amp; change orders</div>';
      phs.forEach(function(p){
        var pp=Math.max(0,Math.min(100,Number(p.pct)||0));
        html+='<div class="ph'+(p.co?' co':'')+'"><span class="nm">'+esc(p.name)+'</span>'+
          '<span class="pbar"><i style="width:'+pp+'%"></i></span><span class="pv">'+pp+'%</span></div>';
      });
    } else {
      html+='<div class="ph-head">No phases linked yet</div>';
    }
    cardBody.innerHTML=html;
    cardEl.classList.add('on');
    _selB=b;
  }
  // Height stepper: ±4 ft per tap, persisted by the parent app on the
  // building node (survives reloads + drives this scene's extrusion).
  var _selB=null;
  cardBody.addEventListener('click', function(e){
    var btn=e.target.closest ? e.target.closest('.hstep') : null;
    if(!btn || !_selB) return;
    var stepFt=Number(btn.getAttribute('data-hstep'))||0;
    var curFt=Math.round((Number(_selB.heightM)||8)*3.2808);
    var nextFt=Math.max(4, Math.min(400, curFt+stepFt));
    var m=nextFt/3.2808;
    _selB.heightM=m; // optimistic — parent will re-feed the authoritative scene
    try{ parent.postMessage({ type:'p86-orbit3d-setheight', nodeId:_selB.nodeId, heightM:m }, location.origin); }catch(_){}
  });

  function startOrbit(){
    if(!map3d || !center) return;
    try{
      map3d.flyCameraAround({
        camera:{ center:{ lat:center.lat, lng:center.lng, altitude:0 }, tilt:62, range:340, heading:map3d.heading||0 },
        durationMillis:70000, repeatCount:Infinity
      });
      orbiting=true; orbitBtn.classList.remove('on');
    }catch(_){}
  }
  function stopOrbit(){
    if(!map3d) return;
    map3d.__userTookControl=true;   // data re-feeds must not restart the spin
    if(orbiting){ try{ map3d.stopCameraAnimation(); }catch(_){} orbiting=false; }
    orbitBtn.classList.add('on');
  }
  orbitBtn.addEventListener('click', startOrbit);

  // ── Design settings (device-local, survive across jobs/sessions) ──
  var design={ shade:'#4f8cff', opacity:0.42, edge:'#22D3EE', pin:'donut', labels:true, blocks:true, byProgress:false };
  try{ var savedD=JSON.parse(localStorage.getItem('p86_orbit3d_design')||'{}'); Object.keys(design).forEach(function(k){ if(savedD[k]!==undefined) design[k]=savedD[k]; }); }catch(_){}
  function saveDesign(){ try{ localStorage.setItem('p86_orbit3d_design', JSON.stringify(design)); }catch(_){} }
  function hexToRgba(hex,a){ var n=parseInt(String(hex).replace('#',''),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }
  function fmtK(n){ n=Number(n)||0; if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; if(n>=1e3) return '$'+Math.round(n/1e3)+'k'; return '$'+Math.round(n); }
  // "Detailed" pin glyph: donut ring + pct on top, compact total $ under it.
  function detailGlyph(b,pct){
    var svg=donutGlyph(pct);
    var t=svg.querySelector('text');
    if(t){ t.setAttribute('y','15'); t.setAttribute('font-size','9.5'); }
    var NS='http://www.w3.org/2000/svg';
    var m=document.createElementNS(NS,'text');
    m.setAttribute('x','18'); m.setAttribute('y','24');
    m.setAttribute('text-anchor','middle'); m.setAttribute('dominant-baseline','middle');
    m.setAttribute('fill','#9be9f5'); m.setAttribute('font-size','6.5'); m.setAttribute('font-weight','600');
    m.setAttribute('font-family','Inter,system-ui,sans-serif');
    m.textContent=fmtK(b.total);
    svg.appendChild(m);
    return svg;
  }

  var lastData=null, lastCenterKey='';
  function render(data){
    if(!Lib){ pending=data; return; }
    pending=null;
    var c=data && data.center; if(!c) return;
    center=c; lastData=data;
    var Map3DElement=Lib.Map3DElement, MapMode=Lib.MapMode;
    var ck=Number(c.lat).toFixed(6)+','+Number(c.lng).toFixed(6);
    try{
      if(!map3d){
        map3d=new Map3DElement({
          center:{ lat:c.lat, lng:c.lng, altitude:0 },
          range:340, tilt:62, heading:0,
          mode:(MapMode && MapMode.SATELLITE) || undefined
        });
        map3d.style.width='100%'; map3d.style.height='100%';
        host.appendChild(map3d);
        // The intro orbit yields to the user: any grab of the map stops the
        // spin (and reveals the ⟳ Orbit button to bring it back).
        map3d.addEventListener('pointerdown', stopOrbit, { capture:true });
        map3d.addEventListener('wheel', stopOrbit, { capture:true, passive:true });
      } else if(ck!==lastCenterKey){
        // Only recenter the camera when the JOB changed — a same-job data
        // re-feed (height step, graph edit) must not yank the view around.
        map3d.center={ lat:c.lat, lng:c.lng, altitude:0 };
        map3d.range=340; map3d.tilt=62; map3d.heading=0;
      }
    }catch(e){ fail('3D view unavailable', (e&&e.message)||''); return; }
    lastCenterKey=ck;
    drawScene();
    // Gentle intro orbit around the site; skipped once the user has taken
    // the camera (a data re-feed mid-session shouldn't restart the spin).
    if(orbiting || !map3d.__userTookControl) startOrbit();
  }

  // Draw (or redraw) every building block + pin from lastData using the
  // current design settings. Cheap enough to run on every settings change.
  function drawScene(){
    if(!map3d || !Lib || !lastData) return;
    var Polygon3DElement=Lib.Polygon3DElement, AltitudeMode=Lib.AltitudeMode;
    var MarkerEl=Lib.Marker3DInteractiveElement || Lib.Marker3DElement;
    clearDrawn();
    (lastData.buildings||[]).forEach(function(b){
      if(!b.path || b.path.length<3) return;
      var h=b.heightM || 8;
      var pct=Math.max(0,Math.min(100,Number(b.pct)||0));
      var shade=design.byProgress ? pctColor(pct) : design.shade;
      if(design.blocks){
        // Buffer the roofline trace ~2.2m outward so the block ENGULFS the
        // building (walls, eaves) instead of slicing through the roof edge.
        var fat=expandPath(b.path, 2.2);
        var coords=fat.map(function(p){ return { lat:p.lat, lng:p.lng, altitude:h }; });
        try{
          var poly=new Polygon3DElement({
            outerCoordinates:coords,
            fillColor:hexToRgba(shade, design.opacity),
            strokeColor:(design.edge==='auto') ? shade : design.edge,
            strokeWidth:2.5,
            extruded:true,
            altitudeMode:(AltitudeMode && AltitudeMode.RELATIVE_TO_GROUND) || undefined,
            drawsOccludedSegments:true
          });
          map3d.appendChild(poly);
          drawn.push(poly);
        }catch(_){}
      }
      // Interactive data pin floating above the roof: % complete at a glance,
      // click for the full building card. Extruded stem ties it to the block.
      if(!MarkerEl) return;
      try{
        var cen=centroid(b.path);
        var mk=new MarkerEl({
          position:{ lat:cen.lat, lng:cen.lng, altitude:h+12 },
          altitudeMode:(AltitudeMode && AltitudeMode.RELATIVE_TO_GROUND) || undefined,
          extruded:true,
          label:(design.labels && b.label) ? b.label : ''
        });
        if(MarkerLib && MarkerLib.PinElement){
          var pin;
          if(design.pin==='dot'){
            // Minimal: small status-colored pin, no glyph — least visual noise.
            pin=new MarkerLib.PinElement({ background:pctColor(pct), borderColor:'#0F172A', glyphColor:'#fff', scale:0.9 });
          } else if(design.pin==='detailed'){
            // Big pin: donut % + compact total $ inside the ring.
            pin=new MarkerLib.PinElement({ background:'#0F172A', borderColor:'#22D3EE', glyph:detailGlyph(b,pct), scale:2.0 });
          } else {
            // Default donut: navy balloon, cyan ring, progress-arc glyph.
            pin=new MarkerLib.PinElement({ background:'#0F172A', borderColor:'#22D3EE', glyph:donutGlyph(pct), scale:1.5 });
          }
          mk.append(pin);
        }
        mk.addEventListener('gmp-click', function(){ stopOrbit(); showCard(b); });
        map3d.appendChild(mk);
        drawn.push(mk);
      }catch(_){}
    });

    // Keep the docked card alive across redraws (height changes, design
    // changes): re-bind it to the same building's fresh data, or hide it.
    if(selId){
      var still=(lastData.buildings||[]).find(function(x){ return (x.nodeId||x.label)===selId; });
      if(still){ showCard(still); } else { hideCard(); }
    }
  }

  // ── Design drawer wiring ──
  var designEl=document.getElementById('design');
  document.getElementById('designBtn').addEventListener('click', function(){ syncDesignUI(); designEl.classList.add('on'); });
  document.getElementById('designX').addEventListener('click', function(){ designEl.classList.remove('on'); });
  function syncDesignUI(){
    designEl.querySelectorAll('#dShade .sw').forEach(function(s){ s.classList.toggle('on', s.getAttribute('data-shade')===design.shade); });
    designEl.querySelectorAll('#dEdge .sw').forEach(function(s){ s.classList.toggle('on', s.getAttribute('data-edge')===design.edge); });
    designEl.querySelectorAll('#dPin .dchip').forEach(function(s){ s.classList.toggle('on', s.getAttribute('data-pin')===design.pin); });
    document.getElementById('dOpacity').value=design.opacity;
    document.getElementById('dLabels').checked=!!design.labels;
    document.getElementById('dBlocks').checked=!!design.blocks;
    document.getElementById('dByProgress').checked=!!design.byProgress;
  }
  function applyDesign(){ saveDesign(); syncDesignUI(); drawScene(); }
  designEl.addEventListener('click', function(e){
    var sw=e.target.closest ? e.target.closest('.sw') : null;
    var chip=e.target.closest ? e.target.closest('.dchip') : null;
    if(sw && sw.parentElement.id==='dShade'){ design.shade=sw.getAttribute('data-shade'); applyDesign(); }
    else if(sw && sw.parentElement.id==='dEdge'){ design.edge=sw.getAttribute('data-edge'); applyDesign(); }
    else if(chip){ design.pin=chip.getAttribute('data-pin'); applyDesign(); }
  });
  document.getElementById('dOpacity').addEventListener('input', function(){ design.opacity=Number(this.value)||0.42; applyDesign(); });
  document.getElementById('dLabels').addEventListener('change', function(){ design.labels=this.checked; applyDesign(); });
  document.getElementById('dBlocks').addEventListener('change', function(){ design.blocks=this.checked; applyDesign(); });
  document.getElementById('dByProgress').addEventListener('change', function(){ design.byProgress=this.checked; applyDesign(); });

  window.addEventListener('message', function(ev){
    if(ev.origin!==location.origin) return;                 // only trust the parent app
    if(ev.data && ev.data.type==='p86-orbit3d-render'){ render(ev.data); }
  });

  // Fetch the referrer-locked Maps key (same-origin → session cookie flows), then boot.
  fetch('/api/config/maps-key', { credentials:'same-origin' })
    .then(function(r){ return r.json(); })
    .then(function(j){ if(j && j.key){ boot(j.key); } else { fail('Map key not configured', 'Set the Google Maps key on the server.'); } })
    .catch(function(){ fail('Could not load the map', 'Failed to fetch the map key.'); });
})();
</script>
</body>
</html>
