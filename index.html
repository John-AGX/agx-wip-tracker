        :root {

            --green: #34d399;
            --yellow: #fbbf24;
            --red: #f87171;
            --orange: #fb923c;
            --purple: #a78bfa;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1a2a4a 0%, #2d3f5a 100%);
            border-bottom: 1px solid var(--border);
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #4f8cff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-subtitle {
            font-size: 14px;
            color: var(--text-dim);
        }
        nav.tabs {
            display: flex;
            gap: 0;
            margin-top: 15px;
            border-bottom: 1px solid var(--border);
        }
        nav.tabs button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 12px 24px;
            cursor: pointer;
            font-size: 15px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        nav.tabs button:hover {
            color: var(--text);
        }
        nav.tabs button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        main {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }
        .main-inner {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        button:hover {
            background: #6999ff;
        }
    </style>

        function saveData() {
            localStorage.setItem('agx-wip-jobs', JSON.stringify(appData.jobs));

        function loadData() {
            let savedJobs = localStorage.getItem('agx-wip-jobs');
            if (savedJobs) {
                try {
                    appData.jobs = JSON.parse(savedJobs);
                } catch (e) {
                    console.error('Failed to load jobs:', e);
                }
            }
            
            let savedProps = localStorage.getItem('agx-estimate-manager');
            if (savedProps) {
                try {
                    appData.estimateProperties = JSON.parse(savedProps);
                } catch (e) {
                    console.error('Failed to load estimate properties:', e);
                }
            }

            let savedEstimates = localStorage.getItem('agx-estimates');

                try {
                    appData.estimates = JSON.parse(savedEstimates);
                } catch (e) {
                    console.error('Failed to load estimates:', e);
                }
            }

            let savedEstimateLines = localStorage.getItem('agx-estimate-lines');

                try {
                    appData.estimateLines = JSON.parse(savedEstimateLines);
                } catch (e) {

        document.querySelectorAll('.tab-btn').forEach(btn => {

                const tabName = this.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(tabName).classList.add('active');

                if (tabName === 'estimates') {

                } else if (tabName === 'wip') {

                }
            });
        });

        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });

        // ==================== WIP TAB ====================

        function renderWIPList() {
            const tbody = document.querySelector('#jobs-table tbody');
            tbody.innerHTML = '';
            
            const statusFilter = document.getElementById('statusFilter').value;
            let filteredJobs = appData.jobs;
            
            if (statusFilter) {
                filteredJobs = appData.jobs.filter(j => j.status === statusFilter);
            } else {
                filteredJobs = appData.jobs.filter(j => j.status !== 'Archived' && j.status !== 'Completed');
            }
            
            filteredJobs.sort((a, b) => parseInt(a.number) - parseInt(b.number));
            
            filteredJobs.forEach((job, idx) => {
                const row = document.createElement('tr');
                
                const materials = (job.materials || 0) + (job.buildings || []).reduce((sum, b) => sum + (b.materials || 0), 0) + (job.phases || []).reduce((sum, p) => sum + (p.materials || 0), 0);
                const labor = (job.labor || 0) + (job.buildings || []).reduce((sum, b) => sum + (b.labor || 0), 0) + (job.phases || []).reduce((sum, p) => sum + (p.labor || 0), 0);
                const sub = (job.sub || 0) + (job.buildings || []).reduce((sum, b) => sum + (b.sub || 0), 0) + (job.phases || []).reduce((sum, p) => sum + (p.sub || 0), 0);
                const equipment = (job.equipment || 0) + (job.buildings || []).reduce((sum, b) => sum + (b.equipment || 0), 0) + (job.phases || []).reduce((sum, p) => sum + (p.equipment || 0), 0);
                const totalCost = materials + labor + sub + equipment;
                const profit = (job.contractAmount || 0) - totalCost;
                const margin = (job.contractAmount || 0) > 0 ? ((profit / (job.contractAmount || 1)) * 100).toFixed(1) : 0;
                
                row.innerHTML = `
                    <td style="width: 40px;">${idx + 1}</td>
                    <td><strong>${job.number}</strong><br><small>${job.title}</small></td>
                    <td>${job.market || '-'}</td>
                    <td><span class="badge" style="background: var(--accent-dim); color: var(--accent);">${job.status}</span></td>
                    <td style="text-align: right;">${formatCurrency(job.contractAmount || 0)}</td>
                    <td style="text-align: right;">${formatCurrency(totalCost)}</td>
                    <td style="text-align: right; color: ${profit >= 0 ? 'var(--green)' : 'var(--red)'}; font-weight: 700;">${formatCurrency(profit)}</td>
                    <td style="text-align: right;">${margin}%</td>
                    <td style="text-align: center; width: 80px;">
                        <button class="small secondary" onclick="viewJob('${job.id}')">View</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            
            // Update summary cards
            const totalPipeline = filteredJobs.reduce((sum, j) => sum + (j.contractAmount || 0), 0);
            const activeCount = filteredJobs.length;
            const totalJobCost = filteredJobs.reduce((sum, j) => {
                const materials = (j.materials || 0) + (j.buildings || []).reduce((s, b) => s + (b.materials || 0), 0) + (j.phases || []).reduce((s, p) => s + (p.materials || 0), 0);
                const labor = (j.labor || 0) + (j.buildings || []).reduce((s, b) => s + (b.labor || 0), 0) + (j.phases || []).reduce((s, p) => s + (p.labor || 0), 0);
                const sub = (j.sub || 0) + (j.buildings || []).reduce((s, b) => s + (b.sub || 0), 0) + (j.phases || []).reduce((s, p) => s + (p.sub || 0), 0);
                const equipment = (j.equipment || 0) + (j.buildings || []).reduce((s, b) => s + (b.equipment || 0), 0) + (j.phases || []).reduce((s, p) => s + (p.equipment || 0), 0);
                return sum + materials + labor + sub + equipment;
            }, 0);
            const totalProfit = totalPipeline - totalJobCost;
            
            document.getElementById('total-pipeline').textContent = formatCurrency(totalPipeline);
            document.getElementById('active-jobs').textContent = activeCount;
            document.getElementById('total-cost').textContent = formatCurrency(totalJobCost);
            document.getElementById('total-profit').textContent = formatCurrency(totalProfit);
        }

        function openAddJobModal() {
            document.getElementById('jobNumber').value = '';
            document.getElementById('jobTitle').value = '';
            document.getElementById('jobMarket').value = '';
            document.getElementById('jobContractAmount').value = '';
            document.getElementById('jobTargetMargin').value = '50';

        function saveJob() {
            const jobNumber = document.getElementById('jobNumber').value.trim();
            const jobTitle = document.getElementById('jobTitle').value.trim();
            const jobMarket = document.getElementById('jobMarket').value;
            const contractAmount = parseFloat(document.getElementById('jobContractAmount').value) || 0;
            const targetMargin = parseFloat(document.getElementById('jobTargetMargin').value) || 50;
            const status = document.getElementById('jobStatus').value;
            
            if (!jobNumber || !jobTitle) {
                alert('Please fill in all required fields');
                return;
            }
            
            const job = {
                id: 'j' + Date.now(),
                number: jobNumber,
                title: jobTitle,
                market: jobMarket,
                contractAmount: contractAmount,
                targetMargin: targetMargin,
                status: status,
                materials: 0,
                labor: 0,
                sub: 0,
                equipment: 0,
                buildings: [],
                phases: [],
                subs: []
            };
            appData.jobs.push(job);
            saveData();
            closeModal('addJobModal');
            renderWIPList();
        }

        function viewJob(jobId) {
            currentJobId = jobId;
            const job = appData.jobs.find(j => j.id === jobId);
            
            document.getElementById('wip-main-view').style.display = 'none';
            document.getElementById('wip-job-detail-view').style.display = 'block';
            
            document.getElementById('job-detail-title').textContent = job.number + ' - ' + job.title;
            document.getElementById('job-detail-status').textContent = 'Status: ' + job.status;
            document.getElementById('job-detail-contract').textContent = 'Contract: ' + formatCurrency(job.contractAmount || 0);
            
            document.getElementById('job-info-number').textContent = job.number;
            document.getElementById('job-info-title').textContent = job.title;
            document.getElementById('job-info-market').textContent = job.market || '-';
            document.getElementById('job-info-contract').textContent = formatCurrency(job.contractAmount || 0);
            document.getElementById('job-info-margin').textContent = (job.targetMargin || 0).toFixed(1) + '%';
            document.getElementById('job-info-status').textContent = job.status;
            
            updateJobDetailView();
        }

                alert('Please fill in title and client');
                return;
            }
            
            const est = {
                id: 'e' + Date.now(),
                title: title,
                client: client,
                address: address,
                baseCost: 0,
                markup: 0,
                clientPrice: 0,
                created: new Date().toISOString()
            };
            appData.estimates.push(est);
            saveData();
            closeModal('newEstimateModal');
            renderEstimatesList();
        }

        function renderEstimatesList() {
            const tbody = document.querySelector('#estimates-table tbody');
            tbody.innerHTML = '';
            
            appData.estimates.forEach(est => {
                const row = document.createElement('tr');
                row.style.cursor = 'pointer';
                row.onclick = function() { editEstimate(est.id); };
                const baseCost = appData.estimateLines.filter(l => l.estimateId === est.id).reduce((sum, l) => sum + (l.unitPrice * l.quantity), 0);
                const markup = est.markup || 0;
                const clientPrice = baseCost * (1 + markup / 100);
                row.innerHTML = `
                    <td><strong>${est.title}</strong><br><small>${est.client}</small></td>
                    <td>${est.client}</td>
                    <td style="text-align: right;">${formatCurrency(baseCost)}</td>
                    <td style="text-align: right;">${markup.toFixed(1)}%</td>
                    <td style="text-align: right;">${formatCurrency(clientPrice)}</td>
                    <td style="text-align: center;">
                        <button class="small secondary" onclick="event.stopPropagation(); editEstimate('${est.id}')">Edit</button>
                        <button class="small secondary" onclick="event.stopPropagation(); deleteEstimate('${est.id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function editEstimate(estId) {
            alert('Edit estimate: ' + estId);
        }

        function deleteEstimate(estId) {
            if (confirm('Delete this estimate?')) {
                appData.estimates = appData.estimates.filter(e => e.id !== estId);
                appData.estimateLines = appData.estimateLines.filter(l => l.estimateId !== estId);
                saveData();
                renderEstimatesList();
            }
        }

        function syncBuildingBudgetFromPct() {
            const job = appData.jobs.find(j => j.id === currentJobId);
            if (job) {
                const pct = parseFloat(document.getElementById('buildingBudgetPct').value) || 0;
                const contractAmt = job.contractAmount || 0;
                const dollars = (pct / 100) * contractAmt;
                document.getElementById('buildingBudget').value = dollars.toFixed(2);
                document.getElementById('buildingBudgetHint').textContent = pct.toFixed(1) + '% of ' + formatCurrency(contractAmt) + ' = ' + formatCurrency(dollars);
            }
        }

        function syncBuildingBudgetFromDollar() {
            const job = appData.jobs.find(j => j.id === currentJobId);
            if (job) {
                const dollars = parseFloat(document.getElementById('buildingBudget').value) || 0;
                const contractAmt = job.contractAmount || 0;
                const pct = contractAmt > 0 ? (dollars / contractAmt) * 100 : 0;
                document.getElementById('buildingBudgetPct').value = pct.toFixed(1);
                document.getElementById('buildingBudgetHint').textContent = pct.toFixed(1) + '% of ' + formatCurrency(contractAmt) + ' = ' + formatCurrency(dollars);
            }
        }
