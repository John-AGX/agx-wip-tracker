<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Header preview</title>
<style>
  body { background:#0e0f12; color:#e7e9ee; font-family:system-ui, sans-serif; margin:0; padding:32px; }
  h1 { font-weight:500; font-size:14px; opacity:0.7; margin:0 0 18px; }
  .header-mock { background:#1a1a2e; padding:8px 16px; display:flex; align-items:center; gap:6px; border-radius:8px; max-width:420px; }
  .header-icon-btn {
    position: relative;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid transparent;
    color: rgba(255, 255, 255, 0.85);
    font-size: 16px; line-height: 1;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0;
    transition: background 0.12s, border-color 0.12s;
  }
  .header-icon-btn:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.18); }
  .header-icon-btn .p86-icon { width: 18px; height: 18px; }
  #header-ask86-btn .p86-icon { width: 24px; height: 24px; }
</style></head>
<body>
<h1>Header cluster — Ask 86 sitting flush with bell / files / directory</h1>
<div class="header-mock">
  <button class="header-icon-btn" data-p86-icon="folder" title="Files"></button>
  <button class="header-icon-btn" data-p86-icon="bell" title="Notifications"></button>
  <button class="header-icon-btn" data-p86-icon="clients" title="Directory"></button>
  <button id="header-ask86-btn" class="header-icon-btn" data-p86-icon="dna-86" title="Ask 86"></button>
</div>
<script src="js/agx-icons.js?v=19b"></script>
</body></html>
